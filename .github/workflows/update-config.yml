name: Update Clash Config

on:
  schedule:
    # 每2小时运行一次（UTC时间，北京时间需要+8）
    - cron: '0 */2 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read

jobs:
  update-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run merge script
        run: python merge_clash.py

      - name: Upload config to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          # 读取配置内容并转义
          CONTENT=$(cat merged_config.yaml | jq -Rs .)

          if [ -z "$GIST_ID" ]; then
            # 创建新的 Gist
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: token $GIST_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"description\": \"Clash Merged Config - Auto Updated\",
                \"public\": false,
                \"files\": {
                  \"merged_config.yaml\": {
                    \"content\": $CONTENT
                  }
                }
              }" \
              https://api.github.com/gists)

            echo "API Response: $RESPONSE"

            GIST_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
            GIST_URL=$(echo "$RESPONSE" | jq -r '.html_url // empty')

            if [ -n "$GIST_ID" ]; then
              echo "✅ Created new Gist!"
              echo "📎 Gist ID: $GIST_ID"
              echo "🔗 Gist URL: $GIST_URL"
              echo ""
              echo "⚠️  请将以下信息添加到仓库 Secrets:"
              echo "   Name: GIST_ID"
              echo "   Value: $GIST_ID"
            else
              echo "❌ 创建 Gist 失败，请检查 GIST_TOKEN 是否有 gist 权限"
              exit 1
            fi
          else
            # 更新现有 Gist
            RESPONSE=$(curl -s -X PATCH \
              -H "Authorization: token $GIST_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"files\": {
                  \"merged_config.yaml\": {
                    \"content\": $CONTENT
                  }
                }
              }" \
              https://api.github.com/gists/$GIST_ID)

            echo "API Response: $RESPONSE"
            echo "✅ Updated Gist: $GIST_ID"
          fi

      - name: Upload config as artifact
        uses: actions/upload-artifact@v4
        with:
          name: merged-config
          path: merged_config.yaml
          retention-days: 7
