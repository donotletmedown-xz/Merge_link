name: Update Clash Config

on:
  schedule:
    # 每2小时运行一次（UTC时间，北京时间需要+8）
    - cron: '0 */2 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run merge script
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          NODE_URLS: ${{ secrets.NODE_URLS }}
        run: python merge_clash.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-config
          name: Clash Config - ${{ github.run_number }}
          body: |
            自动更新的 Clash 配置文件
            更新时间: ${{ github.event.head_commit.timestamp || '手动触发' }}
          files: merged_config.yaml
          make_latest: true
